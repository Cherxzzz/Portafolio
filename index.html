<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalina García | Portafolio</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <header class="header">
        <h1 class="logo">CG's Portafolio</h1>
        <nav>
            <ul class="nav-list">

    <main class="hero">
        <div class="bg-star-decoration">★</div>

                <div class="tags">
                    <span class="tag">🏆 Programming</span>
                    <span class="tag">🧠 Neuroscience</span>
                    <span class="tag">🎨 3D Animation</span>
                </div>

                <div class="buttons">
                    <a href="aboutme.html" class="btn btn-filled">View My Work →</a>
